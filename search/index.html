            // 获取DOM元素
            const grid = document.getElementById('linkGrid');
            const filterContainer = document.getElementById('filterContainer');
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const linkCounter = document.getElementById('linkCounter');

            // 状态变量
            let activeCategory = 'all';       // 当前分类
            let searchTerm = '';               // 搜索词

            // 分类按钮点击事件
            filterContainer.addEventListener('click', (e) => {
                if (e.target.classList.contains('filter-btn')) {
                    // 更新按钮激活样式
                    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                    e.target.classList.add('active');
                    
                    // 更新分类
                    activeCategory = e.target.dataset.category;
                    
                    // 重新渲染
                    renderLinks();
                }
            });

            // 搜索功能 (输入+按钮)
            function performSearch() {
                searchTerm = searchInput.value.trim().toLowerCase();
                renderLinks();
            }

            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });

            // 渲染卡片与计数
            function renderLinks() {
                // 过滤数据
                const filtered = linksData.filter(item => {
                    // 先按分类过滤
                    if (activeCategory !== 'all' && item.category !== activeCategory) {
                        return false;
                    }
                    // 再按搜索词过滤 (name 或 desc)
                    if (searchTerm) {
                        const inName = item.name.toLowerCase().includes(searchTerm);
                        const inDesc = item.desc.toLowerCase().includes(searchTerm);
                        const inCategory = item.category.toLowerCase().includes(searchTerm);
                        return inName || inDesc || inCategory;
                    }
                    return true;
                });

                // 更新计数
                linkCounter.textContent = `🔍 ${filtered.length} 篇相关文章`;

                // 如果过滤后无数据
                if (filtered.length === 0) {
                    grid.innerHTML = `<div class="no-result">😢 没有找到匹配的内容 · 试试其他关键词吧</div>`;
                    return;
                }

                // 生成卡片HTML
                let cardsHTML = '';
                filtered.forEach(link => {
                    // 如果没有自定义图标，取第一个字母或默认
                    const iconChar = link.icon || link.name.charAt(0).toUpperCase();
                    
                    cardsHTML += `
                        <div class="search-card" data-category="${link.category}">
                            <div class="card-header">
                                <div class="post-icon">${iconChar}</div>
                                <div class="post-category">${link.category}</div>
                                <div class="link-button">
                                  <a href="${link.url}" target="_blank" rel="noopener noreferrer"><div class="post-name">${link.name}</div></a>
                                  <span class="visit-arrow">↗</span>
                                </div>
                            <div class="post-desc">${link.desc}</div>
                            </div>
                        </div>
                    `;
                });

                grid.innerHTML = cardsHTML;
            }

            // 初始渲染
            renderLinks();

        })();
